<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Reception Seating – Find Your Table</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    @keyframes hlPulse {
      0%, 100% { opacity: 1; stroke-width: 3; }
      40%       { opacity: 0; stroke-width: 5; }
      60%       { opacity: 0; stroke-width: 5; }
    }
    :root {
      --cream: #FAF6EF;
      --cream-dark: #F0E8D8;
      --cream-mid: #EDE0CC;
      --gold: #C9A84C;
      --gold-light: #E2C97E;
      --gold-dark: #9C7A2E;
      --gold-muted: #D4B870;
      --text-dark: #3A2E1E;
      --text-mid: #6B5740;
      --text-light: #9C8060;
      --shadow: rgba(100, 70, 20, 0.12);
      --focus-ring: 0 0 0 3px rgba(156,122,46,0.55);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      min-height: 100%;
      background-color: var(--cream);
      font-family: 'Jost', sans-serif;
      color: var(--text-dark);
      overscroll-behavior: none;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(201,168,76,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 60% 30% at 80% 100%, rgba(201,168,76,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    :focus-visible {
      outline: 2px solid var(--gold-dark);
      outline-offset: 3px;
      border-radius: 4px;
    }

    .skip-link {
      position: absolute;
      top: -100px;
      left: 16px;
      z-index: 9999;
      background: var(--gold-dark);
      color: #fff;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      text-decoration: none;
      transition: top 0.2s;
    }
    .skip-link:focus { top: 16px; }

    .page-wrapper {
      position: relative;
      z-index: 1;
      max-width: 480px;
      margin: 0 auto;
      padding: 0 20px 60px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 0 28px;
      gap: 16px;
    }

    .logo-wrap {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      overflow: hidden;
      border: 1.5px solid var(--gold-light);
      box-shadow: 0 4px 24px rgba(201,168,76,0.18), 0 0 0 6px rgba(201,168,76,0.07);
      background: var(--cream-dark);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo-placeholder-icon {
      font-size: 32px;
      opacity: 0.35;
      color: var(--gold);
    }

    .ornament {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--gold);
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
    }

    .ornament::before, .ornament::after {
      content: '';
      display: block;
      width: 36px;
      height: 0.5px;
      background: linear-gradient(90deg, transparent, var(--gold-muted));
    }

    .ornament::after {
      background: linear-gradient(90deg, var(--gold-muted), transparent);
    }

    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 34px;
      font-weight: 300;
      color: var(--text-dark);
      text-align: center;
      line-height: 1.15;
      letter-spacing: 0.02em;
      white-space: nowrap;
      font-variant-ligatures: none;
      -webkit-font-smoothing: antialiased;
    }

    .header-sub {
      font-size: 12px;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: var(--text-light);
      text-align: center;
      line-height: 1.8;
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 4px 0 28px;
    }

    .divider-line {
      flex: 1;
      height: 0.5px;
      background: linear-gradient(90deg, transparent, var(--cream-mid), transparent);
    }

    .divider-diamond {
      width: 5px;
      height: 5px;
      background: var(--gold-muted);
      transform: rotate(45deg);
      opacity: 0.7;
    }

    /* ── SEARCH CARD ── */
    .card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(201,168,76,0.22);
      border-radius: 16px;
      padding: 28px 22px;
      box-shadow: 0 8px 40px var(--shadow), 0 1px 0 rgba(255,255,255,0.9) inset;
    }

    .card-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text-dark);
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 0.03em;
    }

    .field-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 18px;
    }

    .field-wrap { position: relative; }

    .field-wrap label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dark);
      font-weight: 400;
      margin-bottom: 6px;
      padding-left: 2px;
    }

    .field-wrap input {
      width: 100%;
      background: var(--cream);
      border: 1px solid var(--cream-mid);
      border-radius: 10px;
      padding: 14px 16px;
      font-family: 'Jost', sans-serif;
      font-size: 16px;
      font-weight: 300;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    .field-wrap input::placeholder { color: var(--text-light); font-weight: 300; }

    .field-wrap input:focus {
      border-color: var(--gold-muted);
      box-shadow: var(--focus-ring);
    }

    .search-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--gold-dark) 0%, var(--gold) 50%, var(--gold-light) 100%);
      border: none;
      border-radius: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 4px 18px rgba(156,122,46,0.3);
      -webkit-appearance: none;
    }

    .search-btn:active { transform: scale(0.98); opacity: 0.9; }
    .search-btn:focus-visible {
      outline: 2px solid var(--gold-dark);
      outline-offset: 3px;
    }

    /* ── RESULTS ── */
    .results-section {
      margin-top: 20px;
      animation: fadeUp 0.4s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-heading {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-light);
      text-align: center;
      margin-bottom: 14px;
    }

    .match-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .match-item {
      background: var(--cream);
      border: 1px solid var(--cream-mid);
      border-radius: 10px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      text-align: left;
      font-family: inherit;
    }

    .match-item:active,
    .match-item:hover { background: var(--cream-dark); }

    .match-item:focus-visible {
      outline: 2px solid var(--gold-dark);
      outline-offset: 2px;
    }

    .match-item .match-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 400;
      color: var(--text-dark);
    }

    .match-item .match-tap {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ── SEAT RESULT ── */
    .seat-result {
      text-align: center;
      padding: 28px 20px;
      background: linear-gradient(145deg, rgba(201,168,76,0.07), rgba(201,168,76,0.02));
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 14px;
    }

    .seat-result .guest-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 300;
      font-style: italic;
      color: var(--text-dark);
      margin-bottom: 6px;
    }

    .seat-result .seat-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-light);
      margin-bottom: 14px;
    }

    .table-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: #fff;
      /* FIX: Use Jost (sans-serif) so numbers render as digits, not roman-numeral-like glyphs */
      font-family: 'Jost', sans-serif;
      font-size: 38px;
      font-weight: 400;
      width: 80px;
      height: 80px;
      line-height: 80px;
      border-radius: 50%;
      box-shadow: 0 6px 24px rgba(156,122,46,0.35);
      margin: 0 auto 16px;
    }

    .table-word {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--gold-dark);
      margin-top: 4px;
    }

    .search-again-btn {
      margin-top: 18px;
      background: none;
      border: 1px solid var(--cream-mid);
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-light);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .search-again-btn:active { border-color: var(--gold-muted); color: var(--gold-dark); }
    .search-again-btn:focus-visible {
      outline: 2px solid var(--gold-dark);
      outline-offset: 3px;
    }

    .not-found {
      text-align: center;
      padding: 20px;
    }

    .not-found p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      color: var(--text-mid);
      font-style: italic;
      margin-bottom: 8px;
    }

    .not-found small {
      font-size: 12px;
      color: var(--text-light);
      font-weight: 300;
    }

    /* ── MAP SECTION ── */
    .map-section { margin-top: 36px; }

    .section-title {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .section-title span {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--text-light);
      white-space: nowrap;
    }

    .section-title-line {
      flex: 1;
      height: 0.5px;
      background: var(--cream-mid);
    }

    .map-frame {
      position: relative;
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 4px 24px var(--shadow);
    }

    .map-frame img {
      width: 100%;
      display: block;
    }

    /* SVG overlay sits on top of the map image */
    .map-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* Pulsing animation for the highlighted table ring */
    @keyframes hlPulse {
      0%, 100% { stroke-width: 3; opacity: 1; }
      50%       { stroke-width: 6; opacity: 0.55; }
    }

    .hl-ring-active {
      animation: hlPulse 1.8s ease-in-out infinite;
    }

    /* ── FOOTER ── */
    .footer {
      margin-top: 48px;
      text-align: center;
    }

    .footer-ornament {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      color: var(--gold-muted);
      font-size: 14px;
      opacity: 0.5;
      margin-bottom: 12px;
    }

    .footer-ornament::before, .footer-ornament::after {
      content: '';
      display: block;
      width: 40px;
      height: 0.5px;
      background: var(--gold-muted);
    }

    .footer p {
      font-size: 11px;
      color: var(--text-light);
      letter-spacing: 0.12em;
      font-weight: 300;
    }

    .field-error {
      display: block;
      font-size: 11px;
      color: #b04a2a;
      letter-spacing: 0.08em;
      margin-top: 5px;
      padding-left: 2px;
      min-height: 16px;
    }

    .field-wrap input[aria-invalid="true"] {
      border-color: #b04a2a;
      box-shadow: 0 0 0 3px rgba(176,74,42,0.12);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>

<a href="#search-form" class="skip-link">Skip to seat finder</a>

<div class="page-wrapper">

  <!-- HEADER -->
  <header class="header" role="banner">
    <div class="logo-wrap" role="img" aria-label="Wedding logo">
      <img src="logo.png" alt="A logo showing the letters 'H' and 'S' with two butterflies" role="presentation"
        onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=\'logo-placeholder-icon\' aria-hidden=\'true\'>🌸</span>'" />
    </div>
    <p class="ornament" aria-hidden="true">Reception</p>
    <h1 class="header-title">Find Your Seat</h1>
    <p class="header-sub">Enter your name below to discover your table assignment</p>
  </header>

  <div class="divider" aria-hidden="true">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>

  <!-- SEARCH CARD -->
  <main id="main-content">
    <div class="card" role="search" aria-label="Table seat finder">
      <p class="card-label" id="form-heading" aria-hidden="true">Your Name</p>

      <form id="search-form" aria-labelledby="form-heading" novalidate onsubmit="handleSearchSubmit(event)">
        <div class="field-group">
          <div class="field-wrap">
            <label for="firstName">First Name</label>
            <input
              type="text"
              id="firstName"
              name="firstName"
              placeholder="e.g. Hemali"
              autocomplete="given-name"
              autocorrect="off"
              autocapitalize="words"
              spellcheck="false"
              aria-required="true"
              aria-describedby="firstName-error name-hint"
            />
            <span id="firstName-error" class="field-error" role="alert" aria-live="polite"></span>
          </div>
          <div class="field-wrap">
            <label for="lastName">Last Name</label>
            <input
              type="text"
              id="lastName"
              name="lastName"
              placeholder="e.g. Shah"
              autocomplete="family-name"
              autocorrect="off"
              autocapitalize="words"
              spellcheck="false"
              aria-required="true"
              aria-describedby="lastName-error"
            />
            <span id="lastName-error" class="field-error" role="alert" aria-live="polite"></span>
          </div>
        </div>
        <p id="name-hint" class="sr-only">Enter at least your first or last name to search the guest list.</p>

        <button type="submit" class="search-btn" aria-label="Search for my table assignment">
          Find My Table
        </button>
      </form>

      <div
        id="resultsArea"
        role="region"
        aria-label="Search results"
        aria-live="polite"
        aria-atomic="true"
      ></div>
    </div>

    <!-- MAP SECTION -->
    <section class="map-section" aria-labelledby="map-heading">
      <div class="section-title">
        <h2 class="sr-only" id="map-heading">Seating Chart Map</h2>
        <span aria-hidden="true">Seating Map</span>
        <div class="section-title-line" aria-hidden="true"></div>
      </div>

      <div class="map-frame">
        <img
          id="seatingMapImg"
          src="IMG_0357.png"
          alt="Seating chart showing the layout of all tables in the reception venue"
          onerror="this.style.display='none'"
        />
        <!--
          SVG overlay — coordinates are based on the original image dimensions (1240 × 870).
          The viewBox matches, so the circles scale perfectly as the image resizes.
          hlRing animates with a pulse; hlFill is a soft gold wash inside the circle.
          Both start invisible (opacity 0) and are shown by highlightTable().
        -->
        <svg
          id="mapHighlightSvg"
          class="map-overlay"
          viewBox="0 0 1240 870"
          preserveAspectRatio="xMidYMid meet"
          aria-hidden="true"
        >
          <circle id="hlFill" r="50" fill="rgba(201,168,76,0.28)" opacity="0" />
          <circle id="hlRing" r="50" fill="none" stroke="#C9A84C" stroke-width="3.5" opacity="0" />
        </svg>
      </div>
    </section>
  </main>

  <!-- FOOTER -->
  <footer class="footer" role="contentinfo">
    <div class="footer-ornament" aria-hidden="true">✦</div>
    <p>Wishing you a wonderful evening</p>
  </footer>

</div>

<!-- Papa Parse for CSV -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script>
let guestData = [];

// ── TABLE COORDINATES ──────────────────────────────────────────────────────────
// These x/y values map each table number to its centre point in the seating chart
// image, which has a natural size of 1240 × 870 px. The SVG overlay uses the same
// viewBox, so the highlight circles scale correctly at any display size.
const TABLE_COORDS = {
   1: {x: 447, y: 410},
   2: {x: 768, y: 410},
   3: {x: 340, y: 325},
   4: {x: 833, y: 325},
   5: {x: 340, y: 418},
   6: {x: 833, y: 418},
   7: {x: 340, y: 513},
   8: {x: 833, y: 513},
   9: {x: 340, y: 605},
  10: {x: 833, y: 605},
  11: {x: 340, y: 697},
  12: {x: 833, y: 697},
  13: {x: 262, y: 232},
  14: {x: 951, y: 232},
  15: {x: 262, y: 325},
  16: {x: 951, y: 325},
  17: {x: 262, y: 418},
  18: {x: 951, y: 418},
  19: {x: 262, y: 513},
  20: {x: 951, y: 513},
  21: {x: 262, y: 605},
  22: {x: 951, y: 605},
  23: {x: 262, y: 697},
  24: {x: 951, y: 697},
  25: {x: 152, y: 232},
  26: {x:1062, y: 232},
  27: {x: 152, y: 325},
  28: {x:1062, y: 325},
  29: {x: 152, y: 418},
  30: {x:1062, y: 418},
  31: {x: 152, y: 513},
  32: {x:1062, y: 513},
  33: {x: 152, y: 605},
  34: {x:1062, y: 605},
  35: {x: 152, y: 697},
  36: {x:1062, y: 697}
};

// ── HIGHLIGHT A TABLE ON THE MAP ───────────────────────────────────────────────
function highlightTable(tableNum) {
  const ring = document.getElementById('hlRing');
  const fill = document.getElementById('hlFill');
  if (!ring || !fill) return;

  const coords = TABLE_COORDS[parseInt(tableNum)];
  if (!coords) {
    ring.setAttribute('opacity', '0');
    fill.setAttribute('opacity', '0');
    return;
  }

  ring.setAttribute('cx', coords.x);
  ring.setAttribute('cy', coords.y);
  fill.setAttribute('cx', coords.x);
  fill.setAttribute('cy', coords.y);

  fill.setAttribute('opacity', '1');
  ring.setAttribute('opacity', '1');

  // Restart the pulse animation cleanly on both circles
  ring.classList.remove('hl-ring-active');
  fill.classList.remove('hl-ring-active');
  void ring.offsetWidth;
  ring.classList.add('hl-ring-active');
  fill.classList.add('hl-ring-active');

  // Scroll the map into view so guests can see the highlight
  document.querySelector('.map-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// ── LOAD CSV ───────────────────────────────────────────────────────────────────
Papa.parse('table.csv', {
  download: true,
  header: true,
  skipEmptyLines: true,
  complete: function(results) {
    guestData = results.data;
  },
  error: function() {
    console.warn('CSV not found. Make sure table.csv is in the same folder.');
  }
});

function normalize(str) {
  return (str || '').toLowerCase().trim();
}

// Levenshtein distance for fuzzy name matching
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, (_, i) => [i]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++) {
    for (let j = 1; j <= n; j++) {
      if (a[i - 1] === b[j - 1]) dp[i][j] = dp[i - 1][j - 1];
      else dp[i][j] = 1 + Math.min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1]);
    }
  }
  return dp[m][n];
}

function scoreName(guest, first, last) {
  const gFirst = normalize(guest['First Name']);
  const gLast  = normalize(guest['Last Name']);
  return levenshtein(gFirst, first) + levenshtein(gLast, last);
}

// ── FORM SUBMIT ────────────────────────────────────────────────────────────────
function handleSearchSubmit(e) {
  if (e) e.preventDefault();
  handleSearch();
}

function setFieldError(fieldId, message) {
  const input = document.getElementById(fieldId);
  const errorEl = document.getElementById(fieldId + '-error');
  if (input) input.setAttribute('aria-invalid', 'true');
  if (errorEl) errorEl.textContent = message;
}

function clearFieldError(fieldId) {
  const input = document.getElementById(fieldId);
  const errorEl = document.getElementById(fieldId + '-error');
  if (input) input.removeAttribute('aria-invalid');
  if (errorEl) errorEl.textContent = '';
}

function handleSearch() {
  const first = normalize(document.getElementById('firstName').value);
  const last  = normalize(document.getElementById('lastName').value);

  clearFieldError('firstName');
  clearFieldError('lastName');

  let hasError = false;
  if (!first) { setFieldError('firstName', 'Please enter your first name.'); hasError = true; }
  if (!last)  { setFieldError('lastName',  'Please enter your last name.');  hasError = true; }
  if (hasError) {
    if (!first) document.getElementById('firstName').focus();
    else        document.getElementById('lastName').focus();
    return;
  }

  if (guestData.length === 0) {
    showMessage('Guest list is loading — please try again in a moment.');
    return;
  }

  const scored = guestData.map(g => ({ guest: g, score: scoreName(g, first, last) }));
  scored.sort((a, b) => a.score - b.score);

  const bestScore = scored[0].score;
  const matches   = scored.filter(s => s.score <= bestScore + 1).slice(0, 6);

  const area = document.getElementById('resultsArea');
  area.innerHTML = '';

  if (matches.length === 0 || bestScore > 6) {
    area.innerHTML = `
      <div class="results-section">
        <div class="not-found" role="alert">
          <p>No match found</p>
          <small>Please check the spelling of your name or ask a member of staff for assistance.</small>
        </div>
      </div>`;
    return;
  }

  if (matches.length === 1) {
    showSeat(matches[0].guest);
  } else {
    window.currentMatches = matches;

    const listItems = matches.map((m, idx) => {
      const name = `${m.guest['First Name']} ${m.guest['Last Name']}${m.guest['Duplicate'] ? ' ' + m.guest['Duplicate'] : ''}`.trim();
      return `
        <li>
          <button class="match-item" onclick="selectGuest(${idx})" aria-label="Select ${name}">
            <span class="match-name">${name}</span>
            <span class="match-tap" aria-hidden="true">Select →</span>
          </button>
        </li>`;
    }).join('');

    area.innerHTML = `
      <div class="results-section">
        <p class="result-heading" id="matches-label">Did you mean one of these guests?</p>
        <ul class="match-list" aria-labelledby="matches-label" style="list-style:none;padding:0;">
          ${listItems}
        </ul>
      </div>`;

    const firstBtn = area.querySelector('.match-item');
    if (firstBtn) firstBtn.focus();
  }
}

function selectGuest(idx) {
  showSeat(window.currentMatches[idx].guest);
}

function showSeat(guest) {
  const area  = document.getElementById('resultsArea');
  const table = guest['Table Number'] || guest['Table'] || '—';
  const fullName = `${guest['First Name']} ${guest['Last Name']}${guest['Duplicate'] ? ' ' + guest['Duplicate'] : ''}`.trim();

  area.innerHTML = `
    <div class="results-section">
      <div class="seat-result">
        <p class="guest-name">${fullName}</p>
        <p class="seat-label">Your table assignment</p>
        <div class="table-badge" role="img" aria-label="Table ${table}">${table}</div>
        <p class="table-word" aria-hidden="true">Table</p>
        <br>
        <button class="search-again-btn" onclick="resetSearch()" aria-label="Clear results and search for another guest">
          Search Again
        </button>
      </div>
    </div>`;

  // Focus result for screen reader announcement
  const result = area.querySelector('.seat-result');
  if (result) { result.setAttribute('tabindex', '-1'); result.focus(); }

  // Highlight the table on the map
  highlightTable(table);

  area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function showMessage(msg) {
  const area = document.getElementById('resultsArea');
  area.innerHTML = `
    <div class="results-section">
      <div class="not-found" role="alert"><p>${msg}</p></div>
    </div>`;
}

function resetSearch() {
  // Hide the map highlight
  const ring = document.getElementById('hlRing');
  const fill = document.getElementById('hlFill');
  if (ring) { ring.setAttribute('opacity', '0'); ring.classList.remove('hl-ring-active'); }
  if (fill) fill.setAttribute('opacity', '0');

  document.getElementById('resultsArea').innerHTML = '';
  document.getElementById('firstName').value = '';
  document.getElementById('lastName').value  = '';
  document.getElementById('firstName').focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
</body>
</html>
